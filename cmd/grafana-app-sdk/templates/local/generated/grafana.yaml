apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: default
---
{{ if .ProxyClientCert.Enabled }}apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-local-dev-all-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:unauthenticated
---
{{ end }}{{ range $.CRDs }}apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana:{{.MachineName}}-user-rolebinding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{.MachineName}}-user
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: default
---
{{end}}{{ if not .DisableGrafanaPluginMount }}apiVersion: v1
kind: ConfigMap
metadata:
  name: {{.PluginIDKube}}-provisioning
  namespace: default
  labels:
    name: grafana
data:
  gas-local-env-app-app.yaml: |
    apiVersion: 1
    apps:
      - type: {{.PluginID}}
        org_id: 1
        org_name: Main Org.
        disabled: false
        jsonData:{{ range $key, $value := .JSONData }}
          {{ $key }}: {{ $value }}{{end}}
        secureJsonData:{{ range $key, $value := .SecureJSONData }}
          {{ $key }}: {{ $value }}{{end}}
{{ end }}{{ if .GenerateGrafanaDeployment }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-apiserver-provisioning
  namespace: default
  labels:
    name: grafana
data:
  apiservices.yaml: |
    {{ range $group, $versions := $.APIGroups }}{{range $versions}}- group: {{$group}}
      version: {{.}}
      host: kubernetes.default.svc
      port: 443
    {{ end }}{{end}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: default
  labels:
    name: grafana
data:
  grafana.ini: |
    app_mode = development
    [analytics]
    reporting_enabled = false
    [tracing.opentelemetry.otlp]
    address = tempo.default.svc:4317
    [auth.anonymous]{{ if .GrafanaAnonymousAuth }}
    enabled = true
    org_role = {{ .GrafanaAnonymousAuth }}{{ else }}
    enabled = false{{ end }}
    [log.frontend]
    enabled = true{{ if not .DisableGrafanaPluginMount }}
    [plugins]
    allow_loading_unsigned_plugins = {{.PluginID}}
    [plugin.{{.PluginID}}]
    tracing = true{{ end }}
    [server]
    http_port = 3000
    root_url =
    router_logging = true
    [unified_alerting]
    enabled = true
    [users]
    default_theme = dark
    [feature_toggles]
    grafanaAPIServerEnsureKubectlAccess = true
    ; disable the experimental APIs flag to disable bundling of the example service locally
    grafanaAPIServerWithExperimentalAPIs = true
    {{ range $group, $versions := .APIGroups }}
    aggregation.{{ replaceGroupName $group "-"}}.enabled=true
    {{ end }}
    kubernetesAggregator = true
    [grafana-apiserver]
    remote_services_file = /app-aggregator/apiservices.yaml{{ if .ProxyClientCert.Enabled }}
    proxy_client_cert_file = /etc/proxy-client-certs/client-auth-proxy.crt
    proxy_client_key_file = /etc/proxy-client-certs/client-auth-proxy.key{{ end }}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: default
  labels:
    name: grafana
spec:
  ports:
    - name: grafana-grafana-metrics
      port: 3000
      targetPort: 3000
    - name: http
      port: 80
      targetPort: 3000
  selector:
    name: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
spec:
  minReadySeconds: 10
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      name: grafana
  template:
    metadata:
      labels:
        name: grafana
    spec:{{ if .ProxyClientCert.Enabled }}
      initContainers:
        - name: copy-proxy-certs
          image: busybox:stable
          command: ["sh", "-c", "cp /k3s-tls/client-auth-proxy.crt /k3s-tls/client-auth-proxy.key /proxy-certs/ && chmod 644 /proxy-certs/*"]
          volumeMounts:
            - mountPath: /k3s-tls
              name: k3s-tls
              readOnly: true
            - mountPath: /proxy-certs
              name: proxy-client-certs
          securityContext:
            runAsUser: 0{{ end }}
      containers:
        - env:
            - name: GF_INSTALL_PLUGINS
              value: "{{.GrafanaInstallPlugins}}"
            - name: GF_PATHS_CONFIG
              value: /etc/grafana-config/grafana.ini{{ range .GrafanaEnvVars }}
            - name: {{.Name}}
              value: "{{.Value}}"{{ end }}
          image: {{.GrafanaImage}}
          imagePullPolicy: IfNotPresent
          name: grafana
          ports:
            - containerPort: 3000
              name: grafana-metrics
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
          volumeMounts:
            - mountPath: /etc/grafana-config
              name: grafana-config{{ if not .DisableGrafanaPluginMount }}
            - mountPath: /etc/grafana/provisioning/plugins
              name: {{.PluginIDKube}}-provisioning
            - mountPath: /var/lib/grafana/plugins/{{.PluginID}}
              name: {{.PluginIDKube}}
              readOnly: true{{ end }}
            - mountPath: /etc/grafana/provisioning/datasources
              name: grafana-datasources
            - mountPath: /app-aggregator
              name: grafana-apiserver-provisioning
              readOnly: true{{ if .ProxyClientCert.Enabled }}
            - mountPath: /etc/proxy-client-certs
              name: proxy-client-certs
              readOnly: true{{ end }}{{ range .GrafanaVolumeMounts }}
            - mountPath: {{.MountPath}}
              name: {{.Name}}
              readOnly: true{{ end }}
      serviceAccount: grafana
      volumes:
        - configMap:
            name: grafana-config
          name: grafana-config{{ if not .DisableGrafanaPluginMount }}
        - configMap:
            name: {{.PluginIDKube}}-provisioning
          name: {{.PluginIDKube}}-provisioning
        - hostPath:
            path: /tmp/k3d/mounted-files/plugin/dist
          name: {{.PluginIDKube}}{{ end }}
        - configMap:
            name: grafana-datasources
          name: grafana-datasources
        - configMap:
            name: grafana-apiserver-provisioning
          name: grafana-apiserver-provisioning{{ if .ProxyClientCert.Enabled }}
        - hostPath:
            path: /var/lib/rancher/k3s/server/tls
          name: k3s-tls
        - emptyDir: {}
          name: proxy-client-certs{{ end }}{{ range .GrafanaVolumeMounts }}
        - hostPath:
            path: {{.HostPath}}
          name: {{.Name}}{{ end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: default
spec:
  rules:
    - host: grafana.k3d.localhost
      http:
        paths:
          - backend:
              service:
                name: grafana
                port:
                  number: 80
            path: /
            pathType: Prefix
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    name: grafana
  name: grafana-datasources
  namespace: default
data:
  Cortex.yml: |
    apiVersion: 1
    datasources:{{ range .Datasources }}
        - access: {{.Access}}
          editable: {{.Editable}}
          isDefault: {{.IsDefault}}
          name: {{.Name}}
          type: {{.Type}}
          uid: {{.UID}}{{ if .URL }}
          url: {{.URL}}{{ end }}
          version: 1{{ if .JSONData }}
          jsonData:{{ range $key, $value := .JSONData }}
            {{$key}}: {{$value}}{{ end }}{{ end }}{{ end }}
{{end}}
